services:
  postgres:
    image: postgres:16-alpine
    container_name: moneylens-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: moneylens
    ports:
      - "5432:5432"
    volumes:
      - moneylens-postgres-data:/var/lib/postgresql/data

volumes:
  moneylens-postgres-data:
